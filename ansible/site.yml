---
# Play 1: Подготовка SSH (добавление хостов в known_hosts)
- name: Prepare SSH connections
  hosts: all
  gather_facts: false
  tasks:
    - name: Check if host in known_hosts
      ansible.builtin.command: ssh-keygen -F {{ inventory_hostname }}
      register: check_host
      failed_when: false
      changed_when: false
      delegate_to: localhost

    - name: Disable host key checking for first connection
      ansible.builtin.set_fact:
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
      when: check_host.rc == 1

    - name: Gather facts to add host to known_hosts
      ansible.builtin.setup:
      when: check_host.rc == 1

# Play 2: Установка ClickHouse
- name: Install ClickHouse
  hosts: clickhouse
  become: true
  vars_files:
    - group_vars/clickhouse.yml
  roles:
    - role: clickhouse-role

# Play 3: Установка Vector
- name: Install and configure Vector
  hosts: vector
  become: true
  vars_files:
    - group_vars/vector.yml
  roles:
    - role: vector-role

# Play 4: Установка Lighthouse
- name: Install and configure Lighthouse
  hosts: lighthouse
  become: true
  vars_files:
    - group_vars/lighthouse.yml
  roles:
    - role: lighthouse-role

# Play 5: Итоговая информация
- name: Display service endpoints
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Get ClickHouse IP
      ansible.builtin.set_fact:
        ch_ip: "{{ hostvars['clickhouse-1'].ansible_host | default('') }}"
      when: "'clickhouse-1' in hostvars"

    - name: Get Vector IP
      ansible.builtin.set_fact:
        vec_ip: "{{ hostvars['vector-1'].ansible_host | default('') }}"
      when: "'vector-1' in hostvars"

    - name: Get Lighthouse IP
      ansible.builtin.set_fact:
        lh_ip: "{{ hostvars['lighthouse-1'].ansible_host | default('') }}"
      when: "'lighthouse-1' in hostvars"

    - name: Show endpoints
      ansible.builtin.debug:
        msg:
          - "✅ Развертывание завершено!"
          - "📊 ClickHouse: http://{{ ch_ip }}:8123 (user: {{ hostvars['clickhouse-1'].clickhouse_user | default('logger') }}, password: {{ hostvars['clickhouse-1'].clickhouse_password | default('logger') }})"
          - "📈 Vector: http://{{ vec_ip }}:8686"
          - "🌐 Lighthouse: http://{{ lh_ip }}"
          - ""
          - "📝 Тестовые данные: положите JSON-логи в /home/rocky/logs/ на vector-1"